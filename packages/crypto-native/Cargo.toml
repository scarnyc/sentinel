[package]
name = "sentinel-crypto-native"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2", default-features = false, features = ["napi4", "tokio_rt"] }
napi-derive = "2"
aes-gcm = "0.10"
pbkdf2 = { version = "0.12", features = ["sha2"] }
sha2 = "0.10"
hmac = "0.12"
zeroize = { version = "1", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
base64 = "0.22"
tokio = { version = "1", features = ["process", "time"] }

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
