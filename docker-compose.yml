services:
  executor:
    build:
      context: .
      target: executor
    ports:
      - "127.0.0.1:3141:3141"
    volumes:
      # Workspace is read-only — executor cannot modify source code
      - .:/workspace:ro
      # Data directory is writable — audit logs, vault, runtime state
      - ./data:/app/data:rw
    environment:
      - SENTINEL_DOCKER=true
      # SENTINEL: H2 — Enable firejail bash sandboxing in Docker
      - SENTINEL_BASH_SANDBOX=firejail
    # SENTINEL: L6 — Container resource limits
    mem_limit: 512m
    cpus: "1.0"
    pids_limit: 256
    # SENTINEL: Container hardening — defense-in-depth against RCE (G5)
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks:
      # Executor joins both networks: internal for agent comms, external for LLM APIs
      - sentinel-internal
      - sentinel-external
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3141/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  agent:
    build:
      context: .
      target: agent
    environment:
      - EXECUTOR_URL=http://executor:3141
      # Route LLM calls through executor proxy — agent never holds API keys
      - ANTHROPIC_BASE_URL=http://executor:3141/proxy/llm
    # SENTINEL: H4 — DNS restriction: agent resolves nothing externally
    dns:
      - "127.0.0.1"
    # SENTINEL: L6 — Container resource limits
    mem_limit: 256m
    cpus: "0.5"
    pids_limit: 128
    # SENTINEL: Container hardening — agent is fully restricted (G5)
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      # Agent only on internal network — no direct internet access
      - sentinel-internal
    depends_on:
      executor:
        condition: service_healthy

networks:
  sentinel-internal:
    driver: bridge
    # internal: true blocks all internet access for connected containers.
    # network_mode: "none" was evaluated but deferred — it disables Docker DNS,
    # requiring Unix domain socket transport (Node.js fetch() doesn't natively support UDS).
    # internal: true is sufficient for MVP: agent cannot reach the internet.
    internal: true
  sentinel-external:
    driver: bridge
