# Rampart custom policy — managed by `rampart allow` / `rampart block`.
# You can edit this file manually. Changes take effect on reload.

version: "1"
policies:
    - name: sentinel-block-tfstate
      match:
        tool:
            - read
            - exec
      rules:
        - action: deny
          when:
            path_matches:
                - '**/.terraform/*.tfstate'
                - .terraform/*.tfstate
                - '**/*.tfstate'
                - '*.tfstate'
                - '**/*.tfstate.backup'
                - '*.tfstate.backup'
          message: Terraform state files may contain secrets — access blocked by Sentinel policy
    - name: sentinel-protect-data
      match:
        tool:
            - read
            - exec
      rules:
        - action: deny
          when:
            path_matches:
                - '**/data/vault.enc'
                - data/vault.enc
                - '**/data/audit.db'
                - data/audit.db
                - '**/data/audit.db-*'
                - data/audit.db-*
                - '**/data/memory.db'
                - data/memory.db
                - '**/data/memory.db-*'
                - data/memory.db-*
          message: Direct access to Sentinel vault/audit/memory data blocked — use the executor API
    - name: sentinel-protect-security-code
      match:
        tool:
            - write
            - edit
      rules:
        - action: ask
          when:
            path_matches:
                - '**/packages/crypto/src/**'
                - packages/crypto/src/**
                - '**/packages/policy/src/**'
                - packages/policy/src/**
                - '**/packages/audit/src/**'
                - packages/audit/src/**
                - '**/packages/types/src/credential-patterns.ts'
                - packages/types/src/credential-patterns.ts
                - '**/packages/executor/src/auth-middleware*'
                - packages/executor/src/auth-middleware*
                - '**/packages/executor/src/credential-filter*'
                - packages/executor/src/credential-filter*
                - '**/packages/executor/src/ssrf-guard*'
                - packages/executor/src/ssrf-guard*
                - '**/packages/executor/src/pii-scrubber*'
                - packages/executor/src/pii-scrubber*
                - '**/packages/executor/src/tools/deny-list.ts'
                - packages/executor/src/tools/deny-list.ts
                - '**/packages/executor/src/tools/path-guard*'
                - packages/executor/src/tools/path-guard*
                - '**/packages/memory/src/validator*'
                - packages/memory/src/validator*
                - '**/sentinel/manifests/**'
                - sentinel/manifests/**
          message: Modifying Sentinel security-critical code — confirm this change is intentional
    - name: custom-allow-commands
      match:
        tool:
            - exec
      rules:
        - action: allow
          when:
            command_matches:
                - gh *
          message: 'User-allowed: gh *'
          added: 2026-03-11T12:17:34.232235Z
